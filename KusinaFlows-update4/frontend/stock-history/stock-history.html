<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock History</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo-section">
      <h2>kusinaflow</h2>
      <p>Inventory management</p>
    </div>

    <nav>
      <ul>
        <li id="dashboardBtn">Dashboard</li>
        <li id="stocksBtn">Stock Management</li>
        <li id="reportBtn">Generate Reports</li>
        <li id="stockHistoryBtn" class="active">Stock History</li>
        <li id="staffManagementBtn">Staff Management</li>
        <li id="logoutBtn">Log Out</li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">

    <header class="topbar">
      <div>
        <h1>Stock History</h1>
        <p class="subtitle">Complete transaction log of stock activities</p>
      </div>
    </header>

    <section class="search-section" style="display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;">
          <div class="search-input-wrapper" style="max-width: 400px; width: 100%;">
            <input type="text" id="historyItemSearchInput" placeholder="Search by Item Name"
                  style="width: 100%; padding: 10px 14px; padding-right: 42px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; outline: none; box-sizing: border-box;">
            <span class="search-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
          </div>

          <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
            <label for="staffFilterSelect" style="font-weight: bold; font-size: 14px; color: #555;">Filter by Stock Controller:</label>
            <select id="staffFilterSelect" style="padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc; background: white; font-size: 14px; cursor: pointer; min-width: 200px;">
              <option value="all">All Stock Controllers</option>
            </select>
            <button id="btnClearStaffFilter" style="display: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; background: #5a4d41; color: white;">Show All History</button>
          </div>
    </section>

    <section class="table-container">
      <table>
        <thead>
          <tr>
            <th>Date & Time</th>
            <th>Item Name</th>
            <th>Action</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>UTD</th>
            <th>Category</th>
            <th>Performed By</th>
            <th>Approved By</th>
          </tr>
        </thead>
        <tbody id="activityTable"></tbody>
      </table> </section>

  </main>
  
  <script src="../db.js"></script>
  <script src="../format.js"></script>
  <script src="../api.js"></script>
  <script src="../nav.js"></script>
  <script src="stock-history.js"></script>

</body>
</html>
